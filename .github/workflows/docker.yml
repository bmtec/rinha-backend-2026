name: Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: api
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/bmtec/rinha-backend-2026:latest
            ghcr.io/bmtec/rinha-backend-2026:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/bmtec/rinha-backend-2026
            org.opencontainers.image.licenses=MIT
