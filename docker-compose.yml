# Rinha de Backend 2026 — submission branch.
# Only public images are referenced here; no source code or build context.
# Resource envelope: services declare 1.0 CPU and 350 MB. The Unix-socket
# tmpfs is explicitly bounded below.

services:
  lb:
    image: ghcr.io/bmtec/rinha-backend-2026:0e80820d6664ca744e45f8896650faf44caccb3c
    platform: linux/amd64
    command: ["/usr/local/bin/lb"]
    cpuset: "1"
    environment:
      LB_PORT: "9999"
      LB_BACKLOG: "65535"
      LB_ACCEPT_BATCH: "32"
      API_SOCKETS: "/sockets/api1.sock,/sockets/api2.sock"
    ports:
      - "9999:9999"
    volumes:
      - sockets:/sockets
    depends_on:
      - api1
      - api2
    networks: [rinha]
    sysctls:
      net.core.somaxconn: "65535"
    ulimits:
      nofile: { soft: 65535, hard: 65535 }
    restart: unless-stopped
    logging:
      driver: "none"
    cpus: "0.04"
    mem_limit: "12MB"
    memswap_limit: "12MB"
    mem_swappiness: 0
    deploy:
      resources:
        limits: { cpus: "0.04", memory: "12MB" }

  api1:
    image: ghcr.io/bmtec/rinha-backend-2026:0e80820d6664ca744e45f8896650faf44caccb3c
    platform: linux/amd64
    command: ["/usr/local/bin/api"]
    cpuset: "0"
    environment:
      API_SOCKET: "/sockets/api1.sock"
      INDEX_PATH: "/data/index.bin"
      NPROBE: "10"
      CONN_POOL_CAP: "512"
      EPOLL_SPIN_US: "15"
      EPOLL_IDLE_US: "40"
      EPOLL_BUSY_POLL_US: "0"
      EPOLL_BUSY_POLL_BUDGET: "0"
      EPOLL_PREFER_BUSY_POLL: "0"
    volumes:
      - sockets:/sockets
    networks: [rinha]
    sysctls:
      net.core.somaxconn: "65535"
    ulimits:
      nofile: { soft: 65535, hard: 65535 }
      memlock: { soft: -1, hard: -1 }
    restart: unless-stopped
    logging:
      driver: "none"
    cpus: "0.48"
    mem_limit: "169MB"
    memswap_limit: "169MB"
    mem_swappiness: 0
    deploy:
      resources:
        limits: { cpus: "0.48", memory: "169MB" }

  api2:
    image: ghcr.io/bmtec/rinha-backend-2026:0e80820d6664ca744e45f8896650faf44caccb3c
    platform: linux/amd64
    command: ["/usr/local/bin/api"]
    cpuset: "2"
    environment:
      API_SOCKET: "/sockets/api2.sock"
      INDEX_PATH: "/data/index.bin"
      NPROBE: "10"
      CONN_POOL_CAP: "512"
      EPOLL_SPIN_US: "15"
      EPOLL_IDLE_US: "40"
      EPOLL_BUSY_POLL_US: "0"
      EPOLL_BUSY_POLL_BUDGET: "0"
      EPOLL_PREFER_BUSY_POLL: "0"
    volumes:
      - sockets:/sockets
    networks: [rinha]
    sysctls:
      net.core.somaxconn: "65535"
    ulimits:
      nofile: { soft: 65535, hard: 65535 }
      memlock: { soft: -1, hard: -1 }
    restart: unless-stopped
    logging:
      driver: "none"
    cpus: "0.48"
    mem_limit: "169MB"
    memswap_limit: "169MB"
    mem_swappiness: 0
    deploy:
      resources:
        limits: { cpus: "0.48", memory: "169MB" }

networks:
  rinha:
    driver: bridge

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=4m,uid=0,gid=0,mode=0777"
