# Rinha de Backend 2026 — submission branch.
# Only public images are referenced here; no source code or build context.
# Memory envelope: services declare 346 MB, plus the 4 MB tmpfs Unix-socket
# volume below, so even counting IPC tmpfs explicitly the total stays 350 MB.

services:
  lb:
    image: ghcr.io/bmtec/rinha-backend-2026:latest
    command: ["/usr/local/bin/lb"]
    cpuset: "2,3"
    environment:
      LB_PORT: "9999"
      LB_BACKLOG: "65535"
      LB_ACCEPT_BATCH: "64"
      API_SOCKETS: "/sockets/api1.sock,/sockets/api2.sock"
    ports:
      - "9999:9999"
    volumes:
      - sockets:/sockets
    depends_on:
      - api1
      - api2
    networks: [rinha]
    ulimits:
      nofile: { soft: 65535, hard: 65535 }
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "0.01", memory: "8MB" }

  api1:
    image: ghcr.io/bmtec/rinha-backend-2026:latest
    command: ["/usr/local/bin/api"]
    cpuset: "0"
    environment:
      API_SOCKET: "/sockets/api1.sock"
      INDEX_PATH: "/data/index.bin"
      NPROBE: "10"
      CONN_POOL_CAP: "512"
      EPOLL_SPIN_US: "0"
      EPOLL_IDLE_US: "40"
      EPOLL_BUSY_POLL_US: "0"
      EPOLL_BUSY_POLL_BUDGET: "8"
      EPOLL_PREFER_BUSY_POLL: "0"
    volumes:
      - sockets:/sockets
    networks: [rinha]
    ulimits:
      nofile: { soft: 65535, hard: 65535 }
      memlock: { soft: -1, hard: -1 }
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "0.495", memory: "169MB" }

  api2:
    image: ghcr.io/bmtec/rinha-backend-2026:latest
    command: ["/usr/local/bin/api"]
    cpuset: "1"
    environment:
      API_SOCKET: "/sockets/api2.sock"
      INDEX_PATH: "/data/index.bin"
      NPROBE: "10"
      CONN_POOL_CAP: "512"
      EPOLL_SPIN_US: "0"
      EPOLL_IDLE_US: "40"
      EPOLL_BUSY_POLL_US: "0"
      EPOLL_BUSY_POLL_BUDGET: "8"
      EPOLL_PREFER_BUSY_POLL: "0"
    volumes:
      - sockets:/sockets
    networks: [rinha]
    ulimits:
      nofile: { soft: 65535, hard: 65535 }
      memlock: { soft: -1, hard: -1 }
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "0.495", memory: "169MB" }

networks:
  rinha:
    driver: bridge

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=4m,uid=0,gid=0,mode=0777"
